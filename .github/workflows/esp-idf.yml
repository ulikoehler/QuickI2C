name: QuickI2C CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  esp-idf-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        esp_idf_version:
          - v5.4
          - v6.0
        target:
          - esp32s2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build smoke test
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.esp_idf_version }}
          target: ${{ matrix.target }}
          path: test/espidf-smoke

  arduino-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Arduino smoke test
        run: pio run -d test/arduino-smoke
